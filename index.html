<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>切片拉伸笔刷 · Slice-Stretch Brush</title>
<style>
:root {
  --bg: #f4f5f7;
  --surface: #ffffff;
  --surface-2: #fafbfc;
  --border: #e4e6eb;
  --border-strong: #d0d3d9;
  --text: #1d1d1f;
  --text-2: #6e6e73;
  --text-3: #9b9b9f;
  --accent: #0a84ff;
  --accent-dark: #0066cc;
  --accent-soft: rgba(10,132,255,0.10);
  --ok: #34c759;
  --warn: #ff9f0a;
  --shadow-card: 0 1px 2px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.06);
  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  padding: 20px;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss01" on, "kern" on;
}
#app { display: flex; gap: 20px; max-width: 1600px; margin: 0 auto; align-items: flex-start; }
#sidebar {
  width: 320px;
  background: var(--surface);
  padding: 22px 20px 24px;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  flex-shrink: 0;
  max-height: calc(100vh - 40px);
  overflow-y: auto;
  scrollbar-width: thin;
}
#sidebar::-webkit-scrollbar { width: 6px; }
#sidebar::-webkit-scrollbar-thumb { background: #d0d3d9; border-radius: 3px; }
#main { flex: 1; background: var(--surface); padding: 18px; border-radius: var(--radius-lg); box-shadow: var(--shadow-card); }
h1 { font-size: 19px; font-weight: 600; margin-bottom: 18px; letter-spacing: -0.2px; }
.section { margin-bottom: 22px; }
.section:last-child { margin-bottom: 0; }
.section-title {
  font-size: 11px; font-weight: 600; color: var(--text-2);
  margin-bottom: 10px; letter-spacing: 0.6px; text-transform: uppercase;
}
button {
  display: block; width: 100%;
  padding: 9px 14px; margin: 5px 0;
  border: 1px solid var(--border-strong);
  background: var(--surface); color: var(--text);
  cursor: pointer; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500;
  font-family: inherit;
  transition: background 0.15s ease, border-color 0.15s ease, transform 0.06s ease;
}
button:hover { background: var(--surface-2); border-color: var(--text-3); }
button:active { transform: scale(0.985); background: #eef0f3; }
button.primary { background: var(--accent); color: white; border-color: var(--accent); }
button.primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
button.ghost { background: transparent; border-color: var(--border); }
button.ghost:hover { background: var(--surface-2); }
.hint { font-size: 11px; color: var(--text-3); margin: 6px 0; line-height: 1.65; }
#sourceCanvas {
  display: block; width: 100%; height: auto;
  cursor: crosshair;
  border: 1px solid var(--border);
  background: #fff; margin-top: 6px;
  border-radius: var(--radius-sm);
}
#mainCanvas {
  display: block; width: 100%;
  cursor: crosshair;
  border: 1px solid var(--border);
  background: #fff;
  border-radius: var(--radius);
}
#fileInput { display: none; }
.status {
  padding: 7px 11px; border-radius: var(--radius-sm);
  font-size: 12px; margin: 8px 0 4px; line-height: 1.5;
  border: 1px solid transparent;
}
.status.warn { background: #fff7e6; border-color: #ffe2a8; color: #8a5800; }
.status.ok   { background: #e8f7ec; border-color: #b9e2c4; color: #1a6c2e; }
.status.info { background: #e8f1ff; border-color: #bcd6ff; color: #0a4ea8; }
.kbd {
  display: inline-block; background: #f0f1f4;
  border: 1px solid var(--border-strong);
  border-radius: 4px; padding: 1px 6px;
  font-family: ui-monospace, "SF Mono", Consolas, monospace;
  font-size: 11px; color: var(--text-2);
}
.row { display: flex; gap: 6px; }
.row > button { flex: 1; margin: 5px 0; }
.mode-toggle { display: flex; gap: 4px; padding: 3px; background: #f0f1f4; border-radius: var(--radius-sm); }
.mode-toggle button {
  flex: 1; font-size: 12px; padding: 6px 10px;
  margin: 0; border: 1px solid transparent; background: transparent;
  border-radius: 5px; color: var(--text-2);
}
.mode-toggle button.active { background: var(--surface); color: var(--text); border-color: var(--border); box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
#sliceInfo { font-size: 10.5px; color: var(--text-3); padding: 4px 0; font-family: ui-monospace, monospace; }

/* sliders */
.slider-row { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
.slider-row .slabel { font-size: 11px; color: var(--text-2); min-width: 32px; }
.slider-row .val { font-family: ui-monospace, monospace; font-size: 11px; color: var(--text-2); min-width: 42px; text-align: right; }
input[type=range] {
  flex: 1; height: 4px; -webkit-appearance: none; appearance: none;
  background: #e4e6eb; border-radius: 2px; outline: none; padding: 0;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 14px; height: 14px; border-radius: 50%;
  background: white; border: 1px solid var(--border-strong);
  box-shadow: 0 1px 2px rgba(0,0,0,0.15);
  cursor: pointer; transition: transform 0.1s;
}
input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.15); }
input[type=range]::-moz-range-thumb {
  width: 14px; height: 14px; border-radius: 50%;
  background: white; border: 1px solid var(--border-strong);
  cursor: pointer;
}
input[type=number], input[type=text] {
  font-family: inherit; font-size: 12px;
  padding: 6px 8px; border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm); background: var(--surface);
  color: var(--text); width: 80px;
}
input[type=number]:focus, input[type=text]:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
input[type=color] {
  width: 32px; height: 24px; padding: 0; border: 1px solid var(--border-strong);
  border-radius: 4px; cursor: pointer; background: transparent;
}
input[type=color]:disabled { opacity: 0.4; cursor: not-allowed; }
label.check { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-2); cursor: pointer; }
label.check input { margin: 0; }

/* 图片库 */
.brush-list {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  margin-bottom: 10px;
}
.brush-item {
  position: relative;
  aspect-ratio: 1 / 1;
  background: var(--surface-2) center / cover no-repeat;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: border-color 0.15s, transform 0.06s;
}
.brush-item:hover { border-color: var(--text-3); }
.brush-item.active { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
.brush-item:active { transform: scale(0.96); }
.brush-pending {
  position: absolute; top: 4px; left: 4px; width: 7px; height: 7px;
  background: var(--warn); border-radius: 50%;
  box-shadow: 0 0 0 1.5px white;
}
.brush-del {
  position: absolute; top: -7px; right: -7px;
  width: 18px; height: 18px; min-width: unset;
  background: #ff3b30; color: white;
  border: 2px solid white; border-radius: 50%;
  font-size: 12px; line-height: 1; padding: 0;
  display: none; cursor: pointer;
  font-weight: bold;
}
.brush-item:hover .brush-del { display: block; }
.brush-del:hover { background: #d70015; }

/* canvas / 背景 */
.canvas-size-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-2); }
.canvas-size-row input { width: 64px; }
.bg-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }

/* 快捷键面板 */
.kbdhint {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 10px; font-size: 11px;
  color: var(--text-2); line-height: 1.85;
}
.kbdhint .kbd { margin-right: 4px; }
</style>
</head>
<body>
<div id="app">

  <div id="sidebar">
    <h1>切片拉伸笔刷</h1>

    <div class="section">
      <div class="section-title">1 · 图片库</div>
      <div id="brushList" class="brush-list"></div>
      <div class="row">
        <button id="btnLoad" class="primary">+ 加载图片</button>
        <button id="btnSample" class="ghost">+ 示例苹果</button>
      </div>
      <input type="file" id="fileInput" accept="image/*">
      <div class="hint">点缩略图切换，悬停显示删除。每张图独立记忆切割线。</div>
    </div>

    <div class="section">
      <div class="section-title">2 · 定义切割线</div>
      <button id="btnCut">在原图上拖一条线 ↘</button>
      <canvas id="sourceCanvas" width="260" height="260"></canvas>
      <div id="cutStatus" class="status warn">尚未加载图片</div>
      <div id="sliceInfo"></div>
    </div>

    <div class="section">
      <div class="section-title">3 · 拉伸模式（按 <span class="kbd">Shift</span> 切换）</div>
      <div class="mode-toggle">
        <button id="modeStraight" class="active">直线拉伸</button>
        <button id="modeCurved">曲线（沿轨迹）</button>
      </div>
      <div class="hint">
        直线：上半截随光标平移，中段被拉成胶囊。<br>
        曲线：中段沿鼠标轨迹弯曲，可像笔刷一样写字。
      </div>
    </div>

    <div class="section">
      <div class="section-title">4 · 笔触粗细（<span class="kbd">[</span> / <span class="kbd">]</span>）</div>
      <div class="slider-row">
        <label class="slabel">粗细</label>
        <input type="range" id="brushSize" min="5" max="300" value="100" step="1">
        <span class="val" id="brushSizeVal">100%</span>
      </div>
      <div class="slider-row">
        <label class="slabel">透明</label>
        <input type="range" id="brushAlpha" min="5" max="100" value="100" step="1">
        <span class="val" id="brushAlphaVal">100%</span>
      </div>
      <div class="slider-row">
        <label class="slabel">羽化</label>
        <input type="range" id="brushFeather" min="0" max="20" value="0" step="1">
        <span class="val" id="brushFeatherVal">0 px</span>
      </div>
      <div class="slider-row">
        <label class="slabel">色相</label>
        <input type="range" id="brushHue" min="-180" max="180" value="0" step="1">
        <span class="val" id="brushHueVal">0°</span>
      </div>
      <label class="check" style="margin-top:8px"><input type="checkbox" id="brushTaper"> 末端收尖（笔锋感）</label>
      <div class="hint">每一笔记录画时的属性。改滑杆后再画就是新设定。</div>
    </div>

    <div class="section">
      <div class="section-title">操作</div>
      <div class="row">
        <button id="btnUndo" title="Ctrl+Z">↶ 撤销</button>
        <button id="btnRedo" title="Ctrl+Shift+Z">↷ 重做</button>
      </div>
      <button id="btnClear">清空画布</button>
      <button id="btnExport" class="primary">导出 PNG</button>
    </div>

    <div class="section">
      <div class="section-title">画布 & 背景</div>
      <div class="canvas-size-row">
        <input type="number" id="canvasW" min="200" max="4096" value="1080">
        <span>×</span>
        <input type="number" id="canvasH" min="200" max="4096" value="720">
        <button id="btnResize" style="margin: 0; padding: 5px 10px; width: auto; font-size: 11px;">应用</button>
      </div>
      <div class="bg-row">
        <span class="slabel">底色</span>
        <input type="color" id="bgColor" value="#ffffff" disabled>
        <label class="check"><input type="checkbox" id="bgTransparent" checked> 透明（棋盘）</label>
      </div>
    </div>

    <div class="section">
      <div class="section-title">快捷键</div>
      <div class="kbdhint">
        <span class="kbd">Shift</span> 切曲线<br>
        <span class="kbd">[</span> <span class="kbd">]</span> 粗细 ±10%<br>
        <span class="kbd">Ctrl+Z</span> 撤销 · <span class="kbd">Ctrl+Shift+Z</span> 重做
      </div>
    </div>
  </div>

  <div id="main">
    <canvas id="mainCanvas" width="1080" height="720"></canvas>
  </div>

</div>

<script>
"use strict";

// ============================================================
// 状态
// ============================================================
const state = {
  // brushes：图片库，每张图独立记忆切割线
  // { id, name, src (HTMLImageElement|Canvas), sliced, cutPoints }
  brushes: [],
  activeBrushId: null,

  // 以下三个是「当前活跃 brush 的快速指代」，便于现有代码读取
  srcImage: null,
  sliced: null,
  cutPoints: [],

  uiMode: 'idle',           // 'idle' | 'defineCut' | 'draw'
  cutDragging: false,
  currentStroke: null,
  strokes: [],
  redoStack: [],

  curvedMode: false,
  brushScale: 1.0,
  brushAlpha: 1.0,
  brushFeather: 0,
  brushHue: 0,
  brushTaper: false,        // 末端收尖（笔锋感）

  // 画布 & 背景
  bgTransparent: true,
  bgColor: '#ffffff',
};

// offscreen canvas：当笔触有 filter / alpha 时，先画到这里再一次性贴到目标 ctx
const offscreenCanvas = document.createElement('canvas');
let offscreenCtx = null;

// ============================================================
// DOM
// ============================================================
const $ = (id) => document.getElementById(id);
const sourceCanvas = $('sourceCanvas');
const sourceCtx = sourceCanvas.getContext('2d');
const mainCanvas = $('mainCanvas');
const mainCtx = mainCanvas.getContext('2d');
const fileInput = $('fileInput');
const cutStatus = $('cutStatus');
const sliceInfo = $('sliceInfo');
const modeStraightBtn = $('modeStraight');
const modeCurvedBtn = $('modeCurved');

// 缓存已落定笔画的画布——避免每帧重画全部
const committedCanvas = document.createElement('canvas');
committedCanvas.width = mainCanvas.width;
committedCanvas.height = mainCanvas.height;
const committedCtx = committedCanvas.getContext('2d');

// offscreen canvas：filter / alpha 笔触先画在这里，再一次性贴到目标
offscreenCanvas.width = mainCanvas.width;
offscreenCanvas.height = mainCanvas.height;
offscreenCtx = offscreenCanvas.getContext('2d');

// ============================================================
// 棋盘格（透明背景视觉提示）
// ============================================================
function drawCheckerboard(ctx, w, h, size = 12) {
  for (let y = 0; y < h; y += size) {
    for (let x = 0; x < w; x += size) {
      ctx.fillStyle = ((x / size + y / size) | 0) % 2 === 0 ? '#fafafa' : '#eeeeee';
      ctx.fillRect(x, y, size, size);
    }
  }
}

// ============================================================
// 图片加载
// ============================================================
$('btnLoad').onclick = () => fileInput.click();

fileInput.onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => acceptSource(img);
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
};

$('btnSample').onclick = () => {
  const c = generateSampleApple();
  acceptSource(c);
};

function acceptSource(imgOrCanvas, name) {
  const id = 'b' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  const brush = {
    id,
    name: name || ('图 ' + (state.brushes.length + 1)),
    src: imgOrCanvas,
    sliced: null,
    cutPoints: [],
  };
  state.brushes.push(brush);
  switchBrush(id);
  state.uiMode = 'defineCut';
  state.cutPoints = [];
  state.cutDragging = false;
  drawSourcePreview();
  renderBrushList();
  setStatus('info', '在原图上按下并拖动一条线定义切割线');
  sliceInfo.textContent = '';
  persist();
}

function switchBrush(id) {
  const b = state.brushes.find(x => x.id === id);
  if (!b) return;
  state.activeBrushId = id;
  state.srcImage = b.src;
  state.sliced = b.sliced;
  state.cutPoints = (b.cutPoints || []).slice();
  state.uiMode = b.sliced ? 'draw' : 'idle';
  if (b.sliced) {
    setStatus('ok', '已切到「' + b.name + '」');
    sliceInfo.textContent = `cut: (${b.sliced.cutMidpoint.x.toFixed(0)}, ${b.sliced.cutMidpoint.y.toFixed(0)}) · angle: ${(b.sliced.cutAngle * 180 / Math.PI).toFixed(1)}°`;
  } else {
    setStatus('warn', '已切到「' + b.name + '」—— 还没定义切割线');
    sliceInfo.textContent = '';
  }
  drawSourcePreview();
  renderBrushList();
  rebuildCommitted();
  paint();
}

function deleteBrush(id) {
  if (state.brushes.length <= 1) {
    setStatus('warn', '至少保留一个 brush');
    return;
  }
  const b = state.brushes.find(x => x.id === id);
  if (!b) return;
  if (!confirm('删除「' + b.name + '」？用它画的笔画也会清掉')) return;
  state.brushes = state.brushes.filter(x => x.id !== id);
  state.strokes = state.strokes.filter(s => s.brushId !== id);
  state.redoStack = state.redoStack.filter(s => s.brushId !== id);
  if (state.activeBrushId === id) {
    switchBrush(state.brushes[0].id);
  } else {
    renderBrushList();
    rebuildCommitted();
    paint();
  }
  persist();
}

function renderBrushList() {
  const list = $('brushList');
  if (!list) return;
  list.innerHTML = '';
  state.brushes.forEach(b => {
    const item = document.createElement('div');
    item.className = 'brush-item' + (b.id === state.activeBrushId ? ' active' : '');
    item.title = b.name + (b.sliced ? '' : '（未定义切线）');
    item.style.backgroundImage = 'url(' + brushThumbnail(b.src) + ')';
    item.onclick = () => switchBrush(b.id);
    if (!b.sliced) {
      const dot = document.createElement('div');
      dot.className = 'brush-pending';
      item.appendChild(dot);
    }
    const del = document.createElement('button');
    del.type = 'button';
    del.className = 'brush-del';
    del.textContent = '×';
    del.title = '删除';
    del.onclick = (e) => { e.stopPropagation(); deleteBrush(b.id); };
    item.appendChild(del);
    list.appendChild(item);
  });
}

function brushThumbnail(src) {
  const w = 56, h = 56;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  const iw = src.width, ih = src.height;
  const s = Math.min(w / iw, h / ih);
  const dw = iw * s, dh = ih * s;
  ctx.drawImage(src, (w - dw) / 2, (h - dh) / 2, dw, dh);
  return c.toDataURL();
}

function generateSampleApple() {
  const c = document.createElement('canvas');
  c.width = 240; c.height = 260;
  const ctx = c.getContext('2d');
  // 苹果体
  ctx.fillStyle = '#d32f2f';
  ctx.beginPath();
  ctx.ellipse(120, 150, 90, 90, 0, 0, Math.PI * 2);
  ctx.fill();
  // 下缘阴影
  ctx.fillStyle = '#a8201c';
  ctx.beginPath();
  ctx.ellipse(120, 230, 18, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  // 高光
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath();
  ctx.ellipse(90, 115, 22, 30, -0.4, 0, Math.PI * 2);
  ctx.fill();
  // 茎
  ctx.fillStyle = '#4e342e';
  ctx.fillRect(115, 50, 10, 30);
  // 叶
  ctx.fillStyle = '#43a047';
  ctx.beginPath();
  ctx.ellipse(145, 60, 22, 11, -0.5, 0, Math.PI * 2);
  ctx.fill();
  return c;
}

function drawSourcePreview() {
  const img = state.srcImage;
  drawCheckerboard(sourceCtx, sourceCanvas.width, sourceCanvas.height, 8);
  if (!img) return;
  const iw = img.width, ih = img.height;
  const scale = Math.min(sourceCanvas.width / iw, sourceCanvas.height / ih);
  const w = iw * scale, h = ih * scale;
  const ox = (sourceCanvas.width - w) / 2, oy = (sourceCanvas.height - h) / 2;
  sourceCtx.drawImage(img, ox, oy, w, h);
  sourceCanvas._scale = scale;
  sourceCanvas._offset = { x: ox, y: oy };

  // 切割点 / 切割线
  if (state.cutPoints.length > 0) {
    sourceCtx.fillStyle = '#00d000';
    sourceCtx.strokeStyle = '#00d000';
    sourceCtx.lineWidth = 2;
    state.cutPoints.forEach(p => {
      sourceCtx.beginPath();
      sourceCtx.arc(ox + p.x * scale, oy + p.y * scale, 5, 0, Math.PI * 2);
      sourceCtx.fill();
    });
    if (state.cutPoints.length === 2) {
      const a = state.cutPoints[0], b = state.cutPoints[1];
      sourceCtx.beginPath();
      sourceCtx.moveTo(ox + a.x * scale, oy + a.y * scale);
      sourceCtx.lineTo(ox + b.x * scale, oy + b.y * scale);
      sourceCtx.stroke();
    }
  }
}

// ============================================================
// 切割线定义（按下 → 拖动预览 → 抬起提交）
// ============================================================
$('btnCut').onclick = () => {
  if (!state.srcImage) { setStatus('warn', '请先加载图片'); return; }
  state.uiMode = 'defineCut';
  state.cutPoints = [];
  state.cutDragging = false;
  state.sliced = null;
  drawSourcePreview();
  setStatus('info', '在原图上按下并拖动一条线（任意角度）');
};

function sourceCanvasPoint(e) {
  const rect = sourceCanvas.getBoundingClientRect();
  const cx = (e.clientX - rect.left) * (sourceCanvas.width / rect.width);
  const cy = (e.clientY - rect.top) * (sourceCanvas.height / rect.height);
  const scale = sourceCanvas._scale;
  const offset = sourceCanvas._offset;
  return { x: (cx - offset.x) / scale, y: (cy - offset.y) / scale };
}

sourceCanvas.addEventListener('mousedown', (e) => {
  if (state.uiMode !== 'defineCut' || !state.srcImage) return;
  const p = sourceCanvasPoint(e);
  state.cutDragging = true;
  state.cutPoints = [p, p];
  drawSourcePreview();
});

sourceCanvas.addEventListener('mousemove', (e) => {
  if (!state.cutDragging) return;
  state.cutPoints[1] = sourceCanvasPoint(e);
  drawSourcePreview();
});

function finishCutDrag(e, canceled) {
  if (!state.cutDragging) return;
  const p = e ? sourceCanvasPoint(e) : state.cutPoints[1];
  state.cutDragging = false;
  const p1 = state.cutPoints[0];
  const d = Math.hypot(p.x - p1.x, p.y - p1.y);
  if (canceled || d < 3) {
    state.cutPoints = [];
    drawSourcePreview();
    setStatus('warn', canceled ? '已取消，请重新拖动一条切割线' : '切割线太短，请再拖一次');
    return;
  }
  state.cutPoints = [p1, p];
  prepareSlicedImage();
  state.uiMode = 'draw';
  setStatus('ok', '切割线已定义，去右侧画布拖拽吧！');
  drawSourcePreview();
}

sourceCanvas.addEventListener('mouseup', (e) => finishCutDrag(e, false));
// 拖出框释放也算正常提交（用当前 cutPoints[1]）
window.addEventListener('mouseup', () => {
  if (state.cutDragging) finishCutDrag(null, false);
});

// 触屏支持（原图）
sourceCanvas.addEventListener('touchstart', (e) => {
  if (state.uiMode !== 'defineCut') return;
  e.preventDefault();
  const t = e.touches[0];
  sourceCanvas.dispatchEvent(new MouseEvent('mousedown', { clientX: t.clientX, clientY: t.clientY }));
});
sourceCanvas.addEventListener('touchmove', (e) => {
  if (!state.cutDragging) return;
  e.preventDefault();
  const t = e.touches[0];
  sourceCanvas.dispatchEvent(new MouseEvent('mousemove', { clientX: t.clientX, clientY: t.clientY }));
});
sourceCanvas.addEventListener('touchend', (e) => {
  if (!state.cutDragging) return;
  e.preventDefault();
  sourceCanvas.dispatchEvent(new MouseEvent('mouseup', {}));
});

function prepareSlicedImage() {
  const img = state.srcImage;
  const [p1, p2] = state.cutPoints;
  const mx = (p1.x + p2.x) / 2;
  const my = (p1.y + p2.y) / 2;
  const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);

  const W = img.width, H = img.height;
  // 对角线大小 → 旋转后图像必能放下
  const diag = Math.ceil(Math.hypot(W, H)) + 4;

  const c = document.createElement('canvas');
  c.width = diag; c.height = diag;
  const ctx = c.getContext('2d');

  // 把图像绕切割中点旋转 -angle，再平移到画布中心
  // → 在此画布中，切割线变成水平线 y = diag/2
  ctx.translate(diag / 2, diag / 2);
  ctx.rotate(-angle);
  ctx.drawImage(img, -mx, -my);

  const cutY = diag / 2;

  // 抽出切割线那一行做独立 1px 高度 canvas，避免 affine 映射时采样到相邻行污染腰部
  const mid = document.createElement('canvas');
  mid.width = diag; mid.height = 1;
  mid.getContext('2d').drawImage(c, 0, cutY, diag, 1, 0, 0, diag, 1);

  state.sliced = {
    canvas: c,
    midRow: mid,
    cutY,
    width: diag,
    height: diag,
    topExtent: cutY,
    bottomExtent: diag - cutY,
    cutMidpoint: { x: mx, y: my },
    cutAngle: angle,
  };

  // 同步到当前活跃 brush，让切换时可以恢复
  const brush = state.brushes.find(x => x.id === state.activeBrushId);
  if (brush) {
    brush.sliced = state.sliced;
    brush.cutPoints = state.cutPoints.slice();
  }
  renderBrushList();
  sliceInfo.textContent = `cut: (${mx.toFixed(0)}, ${my.toFixed(0)}) · angle: ${(angle * 180 / Math.PI).toFixed(1)}°`;
  persist();
}

// ============================================================
// 核心：拉伸贴图算法
// ============================================================
// anchor: 切割线在画布上的锚点（鼠标按下处）
// target: 上半截贴到的位置（鼠标当前位置）
// 局部坐标系：原点 anchor，+Y 指向远离 target（下半截方向）
// → ctx.rotate(stretchAngle + π/2) 后 local +Y = canvas 上 (anchor → 远离 target) 方向
function drawStretchedShape(ctx, sliced, anchor, target, scale = 1) {
  const dx = target.x - anchor.x;
  const dy = target.y - anchor.y;
  const stretchLen = Math.hypot(dx, dy);
  const stretchAngle = Math.atan2(dy, dx);

  const W = sliced.width;
  const cutY = sliced.cutY;
  const topExtent = sliced.topExtent;
  const bottomExtent = sliced.bottomExtent;
  // 目标尺寸：横截面 + 上下半截高度按 scale 缩放；中段长度由 stretchLen 决定
  const Wd = W * scale;
  const halfW = Wd / 2;
  const topD = topExtent * scale;
  const botD = bottomExtent * scale;
  const OVERLAP = 0.75;  // 接缝处每边扩 0.75 px → 1.5 px 重叠吃掉栅格化误差

  ctx.save();
  ctx.translate(anchor.x, anchor.y);
  ctx.rotate(stretchAngle + Math.PI / 2);

  // 下半截：贴在 anchor 这一侧（local +Y），近端向中段方向扩 OVERLAP
  ctx.drawImage(sliced.canvas,
    0, cutY, W, bottomExtent,
    -halfW, -OVERLAP, Wd, botD + OVERLAP);

  // 中段：1px 中行 → 拉伸到 stretchLen，两端各扩 OVERLAP
  if (stretchLen > 0.5) {
    ctx.drawImage(sliced.canvas,
      0, cutY, W, 1,
      -halfW, -stretchLen - OVERLAP, Wd, stretchLen + OVERLAP * 2);
  }

  // 上半截：在 target 那一侧（local -Y），近端向中段方向扩 OVERLAP
  ctx.drawImage(sliced.canvas,
    0, 0, W, topExtent,
    -halfW, -stretchLen - topD, Wd, topD + OVERLAP);

  ctx.restore();
}

// 仿射三角形纹理映射：把源 (sx0..sx2,sy0..sy2) 三角形映到 dest (dx0..dx2,dy0..dy2)。
// 用 clip + setTransform + drawImage 实现。dest 三角形外像素被 clip 裁掉。
function drawAffineTri(ctx, src,
                       sx0, sy0, sx1, sy1, sx2, sy2,
                       dx0, dy0, dx1, dy1, dx2, dy2) {
  const ax = sx1 - sx0, ay = sy1 - sy0;
  const bx = sx2 - sx0, by = sy2 - sy0;
  const det = ax * by - bx * ay;
  if (Math.abs(det) < 1e-9) return;
  const idet = 1 / det;
  const u1x = dx1 - dx0, u1y = dy1 - dy0;
  const u2x = dx2 - dx0, u2y = dy2 - dy0;
  // 求 affine：dx = m11*sx + m12*sy + e ; dy = m21*sx + m22*sy + f
  const m11 = (u1x * by - u2x * ay) * idet;
  const m12 = (-u1x * bx + u2x * ax) * idet;
  const m21 = (u1y * by - u2y * ay) * idet;
  const m22 = (-u1y * bx + u2y * ax) * idet;
  const e = dx0 - m11 * sx0 - m12 * sy0;
  const f = dy0 - m21 * sx0 - m22 * sy0;

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(dx0, dy0);
  ctx.lineTo(dx1, dy1);
  ctx.lineTo(dx2, dy2);
  ctx.closePath();
  ctx.clip();
  // ctx.transform(a,b,c,d,e,f) → 矩阵 [a c e; b d f]
  ctx.transform(m11, m21, m12, m22, e, f);
  ctx.drawImage(src, 0, 0);
  ctx.restore();
}

// 曲线模式 · v0.5 密集 stamp brush
// 关键：抛弃 affine triangle + clip 方案——clip 是 1-bit 栅格化，1px 浮点误差
// 永远会让相邻段公共边上漏白缝。
//
// 改用「沿 path 每 STAMP_STEP px 画一个 W × STAMP_H 的矩形 stamp」：
// - drawImage(midRow, ..., -halfW, -STAMP_H/2, Wd, STAMP_H) 直接旋转贴切线
// - 没有 ctx.clip()，没有 affine triangle 边界 → 没有任何 clip 栅格化误差
// - 相邻 stamp 沿切线方向重叠 STAMP_H - STAMP_STEP > 0 → 段内完全密铺
// - 弯道处 stamp 朝不同切线方向但距离极小 → 外侧楔形 gap < 0.5 px 不可见
// - 急弯加 round-join 补丁 stamp（沿平分角方向）兜底
function drawCurvedStretch(ctx, sliced, path, scale = 1, taper = false) {
  if (path.length < 1) return;
  if (path.length === 1) {
    drawStretchedShape(ctx, sliced, path[0], path[0], scale);
    return;
  }
  const W = sliced.width;
  const cutY = sliced.cutY;
  const topExtent = sliced.topExtent;
  const bottomExtent = sliced.bottomExtent;
  const Wd = W * scale;
  const halfW = Wd / 2;
  const topD = topExtent * scale;
  const botD = bottomExtent * scale;
  const OVERLAP = 0.75;

  // stamp 参数：沿 path 每 STAMP_STEP px 一个 stamp，stamp 沿切线方向高 STAMP_H
  // 重叠量 = STAMP_H - STAMP_STEP；重叠 > 1.5 px 可完全吃掉栅格化误差 + 急弯外缝
  const STAMP_STEP = 0.4;
  const STAMP_H = 2.0;

  // 起点下半截（沿首段切线反向延伸，近端扩 OVERLAP 与中段首 stamp 重叠）
  const p0 = path[0], p1 = path[1];
  const startSegLen = Math.hypot(p1.x - p0.x, p1.y - p0.y) || 1;
  const startTan = Math.atan2(p1.y - p0.y, p1.x - p0.x);
  ctx.save();
  ctx.translate(p0.x, p0.y);
  ctx.rotate(startTan + Math.PI / 2);
  ctx.drawImage(sliced.canvas, 0, cutY, W, bottomExtent, -halfW, -OVERLAP, Wd, botD + OVERLAP);
  ctx.restore();

  // 中段：密集 stamp brush —— 沿 path 每 STAMP_STEP 一个 W × STAMP_H stamp
  // taper 通过 scale 衰减来收尖（在 path 后段 stamp 时 stamp 宽度逐步收缩）
  let totalLen = 0;
  const segLens = new Array(path.length - 1);
  for (let i = 0; i < path.length - 1; i++) {
    segLens[i] = Math.hypot(path[i + 1].x - path[i].x, path[i + 1].y - path[i].y);
    totalLen += segLens[i];
  }
  const taperStart = taper ? totalLen * 0.75 : Infinity;
  const taperRange = taper ? totalLen - taperStart : 1;

  let walked = 0;
  for (let i = 0; i < path.length - 1; i++) {
    const a = path[i], b = path[i + 1];
    const segLen = segLens[i];
    if (segLen < 0.001) continue;
    const segUnitX = (b.x - a.x) / segLen;
    const segUnitY = (b.y - a.y) / segLen;
    const segAngle = Math.atan2(b.y - a.y, b.x - a.x);

    // 段内 stamp 起点：让总弧长落在 STAMP_STEP 整数倍上，保证段间 stamp 不双盖
    const startS = (Math.ceil(walked / STAMP_STEP) * STAMP_STEP) - walked;
    for (let s = startS; s < segLen; s += STAMP_STEP) {
      // taper：当总弧长进入 taperStart 后，逐步缩 stamp 宽度
      let stampWd = Wd, stampHalfW = halfW;
      if (taper) {
        const arcPos = walked + s;
        if (arcPos > taperStart) {
          const t = (arcPos - taperStart) / taperRange;
          const factor = 1 - t * t * (3 - 2 * t);  // smoothstep 1 → 0
          stampWd = Wd * factor;
          stampHalfW = stampWd / 2;
          if (stampWd < 0.5) continue;
        }
      }
      const x = a.x + segUnitX * s;
      const y = a.y + segUnitY * s;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(segAngle + Math.PI / 2);
      ctx.drawImage(sliced.midRow, 0, 0, W, 1, -stampHalfW, -STAMP_H / 2, stampWd, STAMP_H);
      ctx.restore();
    }
    walked += segLen;
  }

  // 段间 round-join 补丁：急弯处外侧楔形 gap 用平分角方向额外 stamp 填掉
  // stamp 高度 = Wd · |tan(Δθ/2)|，外侧扇形空白正好被它覆盖
  for (let i = 1; i < path.length - 1; i++) {
    const prev = path[i - 1], cur = path[i], next = path[i + 1];
    const tanIn = Math.atan2(cur.y - prev.y, cur.x - prev.x);
    const tanOut = Math.atan2(next.y - cur.y, next.x - cur.x);
    const bx = Math.cos(tanIn) + Math.cos(tanOut);
    const by = Math.sin(tanIn) + Math.sin(tanOut);
    if (Math.hypot(bx, by) < 0.01) continue;
    let dAng = tanOut - tanIn;
    while (dAng > Math.PI) dAng -= 2 * Math.PI;
    while (dAng < -Math.PI) dAng += 2 * Math.PI;
    if (Math.abs(dAng) < 0.04) continue;
    const stampH = Math.max(STAMP_H, Wd * Math.tan(Math.abs(dAng) / 2) + 1);
    const bisectAng = Math.atan2(by, bx);
    ctx.save();
    ctx.translate(cur.x, cur.y);
    ctx.rotate(bisectAng + Math.PI / 2);
    ctx.drawImage(sliced.midRow, 0, 0, W, 1, -halfW, -stampH / 2, Wd, stampH);
    ctx.restore();
  }

  // 终点上半截（taper 时跳过 —— 让 stamp 自然衰减到 0 形成笔锋）
  if (!taper) {
    const n = path.length;
    const pm = path[n - 2], pn = path[n - 1];
    const endTan = Math.atan2(pn.y - pm.y, pn.x - pm.x);
    ctx.save();
    ctx.translate(pn.x, pn.y);
    ctx.rotate(endTan + Math.PI / 2);
    ctx.drawImage(sliced.canvas, 0, 0, W, topExtent, -halfW, -topD, Wd, topD + OVERLAP);
    ctx.restore();
  }
}

function drawStroke(ctx, stroke) {
  // 找 stroke 用的那个 brush 的 sliced（不是 state.sliced，因为 active brush 可能已切换）
  let sliced = null;
  if (stroke.brushId) {
    const b = state.brushes.find(x => x.id === stroke.brushId);
    if (b && b.sliced) sliced = b.sliced;
  }
  if (!sliced) sliced = state.sliced;
  if (!sliced) return;

  const sc = stroke.scale || 1;
  const alpha = stroke.alpha !== undefined ? stroke.alpha : 1;
  const feather = stroke.feather || 0;
  const hue = stroke.hue || 0;
  const needsOffscreen = feather > 0 || hue !== 0 || alpha < 1;

  const drawGeom = (targetCtx) => {
    if (stroke.curved && stroke.path.length >= 2) {
      drawCurvedStretch(targetCtx, sliced, stroke.path, sc, stroke.taper);
    } else if (stroke.path.length >= 1) {
      const anchor = stroke.path[0];
      const target = stroke.path[stroke.path.length - 1] || anchor;
      drawStretchedShape(targetCtx, sliced, anchor, target, sc);
    }
  };

  if (!needsOffscreen) {
    drawGeom(ctx);
    return;
  }

  // 先画到 offscreen，无 filter；再用 filter 一次性贴到 ctx
  offscreenCtx.clearRect(0, 0, offscreenCanvas.width, offscreenCanvas.height);
  drawGeom(offscreenCtx);

  ctx.save();
  ctx.globalAlpha = alpha;
  const filters = [];
  if (feather > 0) filters.push(`blur(${feather}px)`);
  if (hue !== 0) filters.push(`hue-rotate(${hue}deg)`);
  if (filters.length) ctx.filter = filters.join(' ');
  ctx.drawImage(offscreenCanvas, 0, 0);
  ctx.restore();
}

// ============================================================
// 渲染：committedCanvas（已落定笔画）+ 实时预览
// ============================================================
function rebuildCommitted() {
  committedCtx.clearRect(0, 0, committedCanvas.width, committedCanvas.height);
  state.strokes.forEach(s => drawStroke(committedCtx, s));
}

function paint() {
  mainCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
  if (state.bgTransparent) {
    drawCheckerboard(mainCtx, mainCanvas.width, mainCanvas.height, 16);
  } else {
    mainCtx.fillStyle = state.bgColor;
    mainCtx.fillRect(0, 0, mainCanvas.width, mainCanvas.height);
  }
  mainCtx.drawImage(committedCanvas, 0, 0);
  if (state.currentStroke) drawStroke(mainCtx, state.currentStroke);
}

function resizeCanvases(w, h) {
  w = Math.max(200, Math.min(4096, w | 0));
  h = Math.max(200, Math.min(4096, h | 0));
  mainCanvas.width = w; mainCanvas.height = h;
  committedCanvas.width = w; committedCanvas.height = h;
  offscreenCanvas.width = w; offscreenCanvas.height = h;
  rebuildCommitted();
  paint();
}

// ============================================================
// 鼠标交互
// ============================================================
function canvasPoint(e) {
  const rect = mainCanvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (mainCanvas.width / rect.width);
  const y = (e.clientY - rect.top) * (mainCanvas.height / rect.height);
  return { x, y };
}

mainCanvas.addEventListener('mousedown', (e) => {
  if (!state.sliced) { setStatus('warn', '请先定义切割线'); return; }
  const p = canvasPoint(e);
  state.currentStroke = {
    brushId: state.activeBrushId,
    path: [p],
    curved: state.curvedMode,
    scale: state.brushScale,
    alpha: state.brushAlpha,
    feather: state.brushFeather,
    hue: state.brushHue,
    taper: state.brushTaper,
  };
  state.redoStack = [];
  paint();
});

mainCanvas.addEventListener('mousemove', (e) => {
  if (!state.currentStroke) return;
  const p = canvasPoint(e);
  if (state.currentStroke.curved) {
    const last = state.currentStroke.path[state.currentStroke.path.length - 1];
    const d = Math.hypot(p.x - last.x, p.y - last.y);
    if (d > 1.5) state.currentStroke.path.push(p);
  } else {
    state.currentStroke.path = [state.currentStroke.path[0], p];
  }
  paint();
});

function endStroke() {
  if (!state.currentStroke) return;
  state.strokes.push(state.currentStroke);
  state.currentStroke = null;
  rebuildCommitted();
  paint();
  persist();
}

mainCanvas.addEventListener('mouseup', endStroke);
mainCanvas.addEventListener('mouseleave', () => {
  if (state.currentStroke) endStroke();
});

// 触屏支持
mainCanvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  mainCanvas.dispatchEvent(new MouseEvent('mousedown', { clientX: t.clientX, clientY: t.clientY }));
});
mainCanvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  mainCanvas.dispatchEvent(new MouseEvent('mousemove', { clientX: t.clientX, clientY: t.clientY }));
});
mainCanvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  mainCanvas.dispatchEvent(new MouseEvent('mouseup', {}));
});

// ============================================================
// 键盘
// ============================================================
window.addEventListener('keydown', (e) => {
  if (e.key === 'Shift') setCurved(true);
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
    e.preventDefault();
    if (e.shiftKey) redo(); else undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') {
    e.preventDefault();
    redo();
  }
  if (e.key === '[') { e.preventDefault(); bumpBrush(-10); }
  if (e.key === ']') { e.preventDefault(); bumpBrush(+10); }
});
window.addEventListener('keyup', (e) => {
  if (e.key === 'Shift') setCurved(false);
});

function bumpBrush(delta) {
  const slider = $('brushSize');
  const v = Math.max(parseInt(slider.min), Math.min(parseInt(slider.max), parseInt(slider.value) + delta));
  slider.value = v;
  slider.dispatchEvent(new Event('input'));
}

const brushSlider = $('brushSize');
const brushSizeVal = $('brushSizeVal');
brushSlider.addEventListener('input', () => {
  const pct = parseInt(brushSlider.value);
  state.brushScale = pct / 100;
  brushSizeVal.textContent = pct + '%';
});

const alphaSlider = $('brushAlpha');
const alphaVal = $('brushAlphaVal');
alphaSlider.addEventListener('input', () => {
  const pct = parseInt(alphaSlider.value);
  state.brushAlpha = pct / 100;
  alphaVal.textContent = pct + '%';
});

const featherSlider = $('brushFeather');
const featherVal = $('brushFeatherVal');
featherSlider.addEventListener('input', () => {
  const v = parseInt(featherSlider.value);
  state.brushFeather = v;
  featherVal.textContent = v + ' px';
});

const hueSlider = $('brushHue');
const hueVal = $('brushHueVal');
hueSlider.addEventListener('input', () => {
  const v = parseInt(hueSlider.value);
  state.brushHue = v;
  hueVal.textContent = v + '°';
});

$('brushTaper').addEventListener('change', () => {
  state.brushTaper = $('brushTaper').checked;
});

// 画布尺寸
$('btnResize').onclick = () => {
  const w = parseInt($('canvasW').value);
  const h = parseInt($('canvasH').value);
  if (w >= 200 && h >= 200) {
    resizeCanvases(w, h);
    persist();
  }
};

// 背景色
$('bgTransparent').addEventListener('change', () => {
  state.bgTransparent = $('bgTransparent').checked;
  $('bgColor').disabled = state.bgTransparent;
  paint();
  persist();
});
$('bgColor').addEventListener('input', () => {
  state.bgColor = $('bgColor').value;
  if (!state.bgTransparent) paint();
  persist();
});

function setCurved(v) {
  state.curvedMode = v;
  modeStraightBtn.classList.toggle('active', !v);
  modeCurvedBtn.classList.toggle('active', v);
}
modeStraightBtn.onclick = () => setCurved(false);
modeCurvedBtn.onclick = () => setCurved(true);

// ============================================================
// 撤销 / 清空 / 导出
// ============================================================
function undo() {
  if (state.strokes.length === 0) return;
  const s = state.strokes.pop();
  state.redoStack.push(s);
  rebuildCommitted();
  paint();
  persist();
}

function redo() {
  if (state.redoStack.length === 0) return;
  const s = state.redoStack.pop();
  state.strokes.push(s);
  rebuildCommitted();
  paint();
  persist();
}

$('btnUndo').onclick = undo;
$('btnRedo').onclick = redo;

$('btnClear').onclick = () => {
  if (state.strokes.length === 0) return;
  if (confirm('清空所有笔画？')) {
    state.strokes = [];
    state.redoStack = [];
    rebuildCommitted();
    paint();
    persist();
  }
};

$('btnExport').onclick = () => {
  if (state.strokes.length === 0) { alert('画布为空'); return; }
  const out = document.createElement('canvas');
  out.width = mainCanvas.width;
  out.height = mainCanvas.height;
  const outCtx = out.getContext('2d');
  // 背景：透明则不填，否则填指定底色
  if (!state.bgTransparent) {
    outCtx.fillStyle = state.bgColor;
    outCtx.fillRect(0, 0, out.width, out.height);
  }
  state.strokes.forEach(s => drawStroke(outCtx, s));
  const link = document.createElement('a');
  link.download = '切片拉伸-' + Date.now() + '.png';
  link.href = out.toDataURL('image/png');
  link.click();
};

// ============================================================
// 工具
// ============================================================
function setStatus(kind, text) {
  cutStatus.className = 'status ' + kind;
  cutStatus.textContent = text;
}

// ============================================================
// localStorage 自动持久化
// ============================================================
const STORAGE_KEY = 'slice-stretch-brush:v1';
let restoring = false;

function srcToDataURL(src) {
  if (src instanceof HTMLCanvasElement) return src.toDataURL();
  // HTMLImageElement
  const c = document.createElement('canvas');
  c.width = src.naturalWidth || src.width;
  c.height = src.naturalHeight || src.height;
  c.getContext('2d').drawImage(src, 0, 0);
  return c.toDataURL();
}

function persist() {
  if (restoring) return;
  try {
    const data = {
      brushes: state.brushes.map(b => ({
        id: b.id, name: b.name,
        cutPoints: b.cutPoints || [],
        srcData: srcToDataURL(b.src),
      })),
      activeBrushId: state.activeBrushId,
      strokes: state.strokes,
      bgTransparent: state.bgTransparent,
      bgColor: state.bgColor,
      canvasW: mainCanvas.width,
      canvasH: mainCanvas.height,
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) {
    // 配额超限就放弃存
  }
}

function loadImageFromDataURL(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = url;
  });
}

async function tryRestore() {
  let data;
  try {
    const json = localStorage.getItem(STORAGE_KEY);
    if (!json) return false;
    data = JSON.parse(json);
  } catch { return false; }
  if (!data || !Array.isArray(data.brushes) || data.brushes.length === 0) return false;

  restoring = true;
  try {
    // 还原 brushes
    for (const b of data.brushes) {
      const img = await loadImageFromDataURL(b.srcData);
      const brush = { id: b.id, name: b.name, src: img, sliced: null, cutPoints: b.cutPoints || [] };
      state.brushes.push(brush);
    }

    // 画布尺寸先恢复
    if (data.canvasW && data.canvasH) {
      mainCanvas.width = data.canvasW; mainCanvas.height = data.canvasH;
      committedCanvas.width = data.canvasW; committedCanvas.height = data.canvasH;
      offscreenCanvas.width = data.canvasW; offscreenCanvas.height = data.canvasH;
      const wInp = $('canvasW'), hInp = $('canvasH');
      if (wInp) wInp.value = data.canvasW;
      if (hInp) hInp.value = data.canvasH;
    }

    // 背景
    state.bgTransparent = data.bgTransparent !== false;
    state.bgColor = data.bgColor || '#ffffff';
    const bt = $('bgTransparent'), bc = $('bgColor');
    if (bt) bt.checked = state.bgTransparent;
    if (bc) { bc.value = state.bgColor; bc.disabled = state.bgTransparent; }

    // 重建每个 brush 的 sliced
    for (const b of state.brushes) {
      if (b.cutPoints && b.cutPoints.length === 2) {
        state.srcImage = b.src;
        state.cutPoints = b.cutPoints.slice();
        state.activeBrushId = b.id;
        prepareSlicedImage();
      }
    }

    // 笔画
    state.strokes = Array.isArray(data.strokes) ? data.strokes : [];

    // 切到 active brush
    const activeId = data.activeBrushId && state.brushes.find(x => x.id === data.activeBrushId)
      ? data.activeBrushId
      : state.brushes[0].id;
    state.activeBrushId = activeId;
    const ab = state.brushes.find(x => x.id === activeId);
    if (ab) {
      state.srcImage = ab.src;
      state.sliced = ab.sliced;
      state.cutPoints = (ab.cutPoints || []).slice();
      state.uiMode = ab.sliced ? 'draw' : 'idle';
    }

    renderBrushList();
    drawSourcePreview();
    rebuildCommitted();
    paint();
    if (state.brushes.length > 0) {
      setStatus('ok', '已恢复上次会话（' + state.brushes.length + ' 张图，' + state.strokes.length + ' 笔）');
    }
    return true;
  } finally {
    restoring = false;
  }
}

// ============================================================
// 启动
// ============================================================
drawCheckerboard(sourceCtx, sourceCanvas.width, sourceCanvas.height, 8);
paint();
tryRestore();
</script>
